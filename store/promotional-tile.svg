    <rect x="14" y="30" width="28" height="17" rx="2" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
    <path d="M14 36h28" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
    <path d="M14 42h28" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
    <path d="M24 30v17" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
  </g>

  <!-- Title -->
  <text x="220" y="210" font-family="Segoe UI, sans-serif" font-size="22" font-weight="700" fill="white" text-anchor="middle">Canvas-Notion Sync</text>

  <!-- Subtitle -->
