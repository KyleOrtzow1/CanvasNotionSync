    <path d="M0 10h36" stroke="white" stroke-width="2.5" stroke-dasharray="4 3" opacity="0.7"/>
    <path d="M60 10h36" stroke="white" stroke-width="2.5" stroke-dasharray="4 3" opacity="0.7"/>
    <!-- Sync circle -->
    <circle cx="48" cy="10" r="14" fill="#4caf50"/>
    <path d="M42 10l4 4 8-8" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

