      <stop offset="0%" stop-color="#1b5e20"/>
      <stop offset="100%" stop-color="#2e7d32"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="440" height="280" fill="url(#bg)"/>

  <!-- Canvas icon (left) -->
  <g transform="translate(100, 100)">
