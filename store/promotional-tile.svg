    <text x="28" y="22" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600" fill="white" text-anchor="middle">Canvas</text>
    <path d="M14 30h28v3H14z" fill="rgba(255,255,255,0.6)"/>
    <path d="M14 37h28v3H14z" fill="rgba(255,255,255,0.6)"/>
    <path d="M14 44h20v3H14z" fill="rgba(255,255,255,0.6)"/>
  </g>

  <!-- Arrow -->
